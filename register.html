<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="CSS/styles.css" rel="stylesheet">
<script src="constants.js"></script>
<script src="auth-helpers.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4" style="width: 100%; max-width: 450px;">
  <h3 class="text-center mb-4">Register</h3>
  <form id="registerForm">
    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control" id="username" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" required>
    </div>
    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="confirmPassword" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Register</button>
  </form>
  <div class="mt-3 text-center">
    <a href="index.html">Already have an account? Login</a>
  </div>
</div>

<script>
/**
 * @fileoverview Register page - User registration handler
 * @description Handles new user registration with comprehensive validation
 */

/**
 * Handles registration form submission
 * Validates all fields, checks password requirements, and creates new user
 * 
 * @event submit
 * @listens registerForm#submit
 */
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();

    // Validate all fields are filled
    if (!username || !email || !password || !confirmPassword) {
        alert(VALIDATION_MESSAGES.ALL_FIELDS_REQUIRED);
        return;
    }

    // Validate email format
    if (!isValidEmail(email)) {
        alert(VALIDATION_MESSAGES.INVALID_EMAIL);
        return;
    }

    // Validate password length
    if (password.length < PASSWORD_REQUIREMENTS.MIN_LENGTH) {
        alert(VALIDATION_MESSAGES.SHORT_PASSWORD);
        return;
    }

    // Validate password confirmation
    if (password !== confirmPassword) {
        alert(VALIDATION_MESSAGES.PASSWORDS_NOT_MATCH);
        return;
    }

    // Register user
    if (registerUser(username, email, password)) {
        alert(VALIDATION_MESSAGES.REGISTRATION_SUCCESS);
        redirectTo(ROUTES.LOGIN);
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
