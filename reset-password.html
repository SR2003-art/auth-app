<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<link href="CSS/styles.css" rel="stylesheet">
<script src="constants.js"></script>
<script src="auth-helpers.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4" style="width: 100%; max-width: 400px;">
  <h3 class="text-center mb-4">Reset Password</h3>
  <form id="resetForm">
    <div class="mb-3">
      <label for="password" class="form-label">New Password</label>
      <div class="input-group">
        <input type="password" class="form-control" id="password" required>
        <button type="button" class="btn btn-outline-secondary" id="togglePassword"><i class="bi bi-eye"></i></button>
      </div>
    </div>
    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="confirmPassword" required>
    </div>
    <button type="submit" class="btn btn-success w-100">Update Password</button>
  </form>
</div>

<script>
/**
 * @fileoverview Reset Password page - Password update handler
 * @description Allows users to set a new password during the reset flow
 */

const togglePassword = document.getElementById('togglePassword');
const password = document.getElementById('password');

/**
 * Toggles password visibility between text and password input types
 * Updates the eye icon accordingly
 * 
 * @event click
 * @listens togglePassword#click
 */
togglePassword.addEventListener('click', () => {
    const type = password.type === 'password' ? 'text' : 'password';
    password.type = type;
    togglePassword.innerHTML = type === 'password' 
        ? '<i class="bi bi-eye"></i>' 
        : '<i class="bi bi-eye-slash"></i>';
});

/**
 * Handles reset password form submission
 * Validates password requirements and updates user password
 * Clears the reset session and redirects to login
 * 
 * @event submit
 * @listens resetForm#submit
 */
document.getElementById('resetForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const newPassword = password.value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();

    // Validate passwords are entered
    if (!newPassword || !confirmPassword) {
        alert(VALIDATION_MESSAGES.NEW_PASSWORD_REQUIRED);
        return;
    }

    // Validate password length
    if (newPassword.length < PASSWORD_REQUIREMENTS.MIN_LENGTH) {
        alert(VALIDATION_MESSAGES.SHORT_PASSWORD);
        return;
    }

    // Validate password confirmation
    if (newPassword !== confirmPassword) {
        alert(VALIDATION_MESSAGES.PASSWORDS_NOT_MATCH);
        return;
    }

    // Verify password reset flow was initiated
    const resetEmail = getPasswordResetEmail();
    if (!resetEmail) {
        alert(VALIDATION_MESSAGES.START_FROM_FORGOT);
        redirectTo(ROUTES.FORGOT_PASSWORD);
        return;
    }

    // Update password and complete reset flow
    if (updateUserPassword(resetEmail, newPassword)) {
        clearPasswordResetEmail();
        alert(VALIDATION_MESSAGES.PASSWORD_UPDATED);
        redirectTo(ROUTES.LOGIN);
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
