<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="CSS/styles.css" rel="stylesheet">
<script src="constants.js"></script>
<script src="auth-helpers.js"></script>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4" style="width: 100%; max-width: 400px;">
  <h3 class="text-center mb-4">Forgot Password</h3>
  <form id="forgotForm">
    <div class="mb-3">
      <label for="email" class="form-label">Email address</label>
      <input type="email" class="form-control" id="email" required>
    </div>
    <button type="submit" class="btn btn-warning w-100">Send Reset Link</button>
  </form>
  <div class="mt-3 text-center">
    <a href="index.html">Back to Login</a>
  </div>
</div>

<script>
/**
 * @fileoverview Forgot Password page - Password reset initiation
 * @description Handles email verification to start password reset flow
 */

/**
 * Handles forgot password form submission
 * Verifies user email exists and initiates password reset flow
 * Stores email in localStorage for reset page to access
 * 
 * @event submit
 * @listens forgotForm#submit
 */
document.getElementById('forgotForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();

    // Validate email is entered
    if (!email) {
        alert(VALIDATION_MESSAGES.ENTER_RESET_EMAIL);
        return;
    }

    // Validate email format
    if (!isValidEmail(email)) {
        alert(VALIDATION_MESSAGES.INVALID_EMAIL);
        return;
    }

    // Check if user exists
    if (findUserByEmail(email)) {
        if (setPasswordResetEmail(email)) {
            alert(VALIDATION_MESSAGES.RESET_LINK_SENT);
            redirectTo(ROUTES.RESET_PASSWORD);
        }
    } else {
        alert(VALIDATION_MESSAGES.EMAIL_NOT_FOUND);
    }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
